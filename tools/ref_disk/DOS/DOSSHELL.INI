PC9801.INI
*****************  注意  *********************
このファイルは 1 行が 256 文字以上になる場合が
あります. エディタによってはこれらの行を切り
詰めたり複数の行に分けたりしてしまいます. もし
現在使用しているエディタにこの制限があるか分
からない時はファイルの保存をせずにエディタを
終了してください.

****************  NOTE  ***********************
最初の左角かっこまでは全てコメントとなります.
***********************************************
[savestate]
screenmode = graphics
resolution = low
startup = filemanager
filemanagermode = shared
sortkey = name
pause = disabled
explicitselection = disabled
swapmouse = disabled
tasklist = disabled
switching = disabled
sortorder = ascending
displayhiddenfiles = disabled
replaceconfirm = enabled
deleteconfirm = enabled
mouseconfirm = enabled
crossdirselection = disabled
[programstarter]
currentcolor = ｱｸｱﾎﾟﾘｽ
filemanager = enabled
command = enabled
group = 
{
    program = 
    {
        command = MORE < \README.DOC
        title = 本製品のご紹介
        help = 日本語ＭＳ－ＤＯＳ（Ｖｅｒ５．０Ａ）を紹介します．^m（ご使用の前にお読みください）
    }
    special = default
    program = 
    {
        command = MORE < \README2.DOC
        title = ご使用上の注意点
        help = 本製品をご使用する場合の注意点を説明します．
    }
    program = 
    {
        command = DIR %1 /P
        title = ﾌｧｲﾙ名一覧の表示
        help = 指定したドライブのファイル名一覧を表示します．^m^m・ドライブ名を入力してください．^m  例  B:      （カレントディレクトリのとき）^m      B:\     （ルートディレクトリのとき）^m      B:\ABC  （ディレクトリ名ABCの下のとき）
        pause = enabled
        dialog = 
        {
            title = ﾌｧｲﾙ名一覧の表示
            parameter = %1
            info = ドライブ名を入力してください．
            prompt = ﾊﾟﾗﾒｰﾀ入力
            default = X:
        }
    }
    program = 
    {
        command = COMMAND
        title = ｺﾏﾝﾄﾞﾌﾟﾛﾝﾌﾟﾄ
        help = コマンドプロンプトを起動し, MS-DOSのコマンド入力状態にします.^m^mコマンドプロンプトからMS-DOSシェルに戻るためには:^m^m1. コマンド　プロンプトに続けて、EXITと入力します. ^m2.[ﾘﾀｰﾝ]キーを押してください.^m^m関連項目^m   " コマンド プロンプトの詳細 "~$129~
        pause = disabled
        screenmode = graphics
        alttab = enabled
        altesc = enabled
        ctrlesc = enabled
        prevent = disabled
    }
    group = 
    {
        title = ﾃﾞｨｽｸ操作
        help = ディスクの初期化，コピー等を行うサブメニューを表示します．
        program = 
        {
            command = FORMAT %1 /M
            title = 2HDﾌﾛｯﾋﾟｨﾃﾞｨｽｸの初期化
            help = ２ＨＤのフロッピィディスクを初期化し、ＭＳ－ＤＯＳで使用できるようにします．^m^m・ドライブ名を入力してください．^m  例  B:
            pause = enabled
            dialog = 
            {
                title = ﾌﾛｯﾋﾟｨﾃﾞｨｽｸの初期化(2HD)
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
        }
        program = 
        {
            command = FORMAT %1 /9
            title = 2DDﾌﾛｯﾋﾟｨﾃﾞｨｽｸの初期化
            help = ２ＤＤのフロッピィディスクを初期化し、ＭＳ－ＤＯＳで使用できるようにします．^m^m・ドライブ名を入力してください．^m  例  B:
            pause = enabled
            dialog = 
            {
                title = ﾌﾛｯﾋﾟｨﾃﾞｨｽｸの初期化(2DD)
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
        }
        program = 
        {
            command = DISKCOPY
            title = ﾌﾛｯﾋﾟｨﾃﾞｨｽｸの複写
            help = フロッピィディスクの複写（バックアップ）を作成します．^m受け側に初期化をしていないフロッピィディスクが入っている場合、初期化を行いながら複写します．^m^m・メニューにしたがって操作してください．
        }
        program = 
        {
            command = FORMAT /H
            title = 固定ﾃﾞｨｽｸの初期化
            help = 固定ディスクの初期化，領域確保等を行います．^m^m・メニューにしたがって操作してください．^m^m注意^m  固定ディスクの初期化，領域確保，領域解放を行った場合、終了後リセットを行い、ＭＳ－ＤＯＳを再起動してください．
            screenmode = text
            alttab = enabled
            altesc = enabled
            ctrlesc = enabled
            prevent = disabled
            pause = enabled
        }
    }
    group = 
    {
        title = その他の操作
        help = システムの設定等を行うサブメニューを表示します．
        program = 
        {
            command = CUSTOM
            title = ｼｽﾃﾑ環境の変更
            help = 日本語入力／ＥＭＳの使用など、システムの環境を変更します．^m^m・メニューにしたがって操作してください．
        }
        program = 
        {
            command = SYS %1
            title = ｼｽﾃﾑﾌｧｲﾙの転送
            help = 指定したドライブのディスクへシステムファイルを登録します．^m^m・転送先のドライブ名を入力してください．^m  例  B:
            pause = enabled
            dialog = 
            {
                title = ｼｽﾃﾑﾌｧｲﾙの転送
                parameter = %1
                info = 転送先のドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
        }
        program = 
        {
            command = MORE < %1%2
            title = ﾃｷｽﾄﾌｧｲﾙの内容表示
            help = テキストファイルの内容を画面に表示します．^m^m①ドライブ名を入力してください．^m  例  B:      （カレントディレクトリのとき）^m      B:\     （ルートディレクトリのとき）^m      B:\ABC\ （ディレクトリ名ABCの下のとき）^m②ファイル名を入力してください．
            pause = enabled
            dialog = 
            {
                title = ﾃｷｽﾄﾌｧｲﾙの内容表示
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
            dialog = 
            {
                title = ﾃｷｽﾄﾌｧｲﾙの内容表示
                parameter = %2
                info = ファイル名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
            }
        }
        program = 
        {
            command = SEDIT %1%2
            title = ﾃｷｽﾄﾌｧｲﾙの内容編集
            help = テキストファイルの内容を編集します．^m^m①ドライブ名を入力してください．^m  例  B:      （カレントディレクトリのとき）^m      B:\     （ルートディレクトリのとき）^m      B:\ABC\ （ディレクトリ名ABCの下のとき）^m②ファイル名を入力してください．
            pause = enabled
            dialog = 
            {
                title = ﾃｷｽﾄﾌｧｲﾙの内容編集
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
            dialog = 
            {
                title = ﾃｷｽﾄﾌｧｲﾙの内容編集
                parameter = %2
                info = ファイル名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
            }
        }
        program = 
        {
            command = VOL %1
            title = ﾎﾞﾘｭｰﾑﾗﾍﾞﾙの表示
            help = ディスクに付けられた名前（ボリュームラベル）を表示します．^m^m・ドライブ名を入力してください．^m  例  B:
            pause = enabled
            dialog = 
            {
                title = ﾎﾞﾘｭｰﾑﾗﾍﾞﾙの表示
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
        }
        program = 
        {
            command = LABEL %1%2
            title = ﾎﾞﾘｭｰﾑﾗﾍﾞﾙの設定
            help = ディスクに付けられた名前（ボリュームラベル）を設定します．^m^m①ドライブ名を入力してください．^m  例  B:^m②ボリュームラベルを入力してください．
            pause = enabled
            dialog = 
            {
                title = ﾎﾞﾘｭｰﾑﾗﾍﾞﾙの設定
                parameter = %1
                info = ドライブ名を入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
                default = X:
            }
            dialog = 
            {
                title = ﾎﾞﾘｭｰﾑﾗﾍﾞﾙの設定
                parameter = %2
                info = ボリュームラベルを入力してください．
                prompt = ﾊﾟﾗﾒｰﾀ入力
            }
        }
        program = 
        {
            command = DATE
            title = 日付の変更
            help = 日付を変更します．
        }
        program = 
        {
            command = TIME
            title = 時刻の変更
            help = 時刻を変更します．
        }
        program = 
        {
            command = VERIFY ON
            title = ﾃﾞｨｽｸ書き込み検査の設定
            help = ディスク書き込み時のベリファイ指定（検査）を設定します．
        }
        program = 
        {
            command = VERIFY OFF
            title = ﾃﾞｨｽｸ書き込み検査の解除
            help = ディスク書き込み時のベリファイ指定（検査）を解除します．
        }
    }
